<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Cartful</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #fafaf9;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #f5f5f4;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(28, 25, 23, 0.06);
      max-width: 440px;
      width: 100%;
      padding: 40px;
    }

    .wordmark {
      font-family: 'Lora', serif;
      font-weight: 700;
      font-size: 28px;
      color: #1c1917;
      text-align: center;
      margin-bottom: 32px;
    }

    .body-text {
      font-size: 15px;
      font-weight: 400;
      color: #57534e;
      line-height: 1.6;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #57534e;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: #f5f5f4;
      border: 1.5px solid #e7e5e4;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #1c1917;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .form-input::placeholder {
      color: #a8a29e;
    }

    .form-input:focus {
      border-color: #5e8054;
    }

    .form-input.input-error {
      border-color: #c0392b;
    }

    .field-error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 6px;
      display: none;
    }

    .field-error.visible {
      display: block;
    }

    .submit-btn {
      width: 100%;
      height: 48px;
      background: #5e8054;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.15s ease;
    }

    .submit-btn:hover:not(:disabled) {
      background: #4a6742;
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .api-error {
      font-size: 13px;
      color: #c0392b;
      line-height: 1.5;
      text-align: center;
      margin-top: 16px;
      display: none;
    }

    .api-error.visible {
      display: block;
    }

    /* Success state */
    .success-view {
      text-align: center;
      display: none;
    }

    .success-view.active {
      display: block;
    }

    .checkmark {
      width: 48px;
      height: 48px;
      margin-bottom: 20px;
    }

    .success-title {
      font-weight: 600;
      font-size: 18px;
      color: #5e8054;
      margin-bottom: 12px;
    }

    .hint {
      font-size: 13px;
      color: #a8a29e;
      line-height: 1.5;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Cartful</div>

    <div id="form-view">
      <p class="body-text" style="margin-bottom: 24px;">Enter your new password below.</p>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-input" id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" />
          <p class="field-error" id="password-error"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <input class="form-input" id="confirm" type="password" placeholder="Re-enter your password" autocomplete="new-password" />
          <p class="field-error" id="confirm-error"></p>
        </div>

        <button class="submit-btn" type="submit" id="submit-btn">Reset Password</button>
        <p class="api-error" id="api-error"></p>
      </form>
    </div>

    <div id="success-view" class="success-view">
      <svg class="checkmark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" stroke="#5e8054" stroke-width="3" fill="none"/>
        <path d="M14 24.5l7 7 13-14" stroke="#5e8054" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="success-title">Your password has been reset!</p>
      <p class="body-text">You can close this page and sign in with your new password in the Cartful app.</p>
    </div>
  </div>

  <script>
    // Update this to production URL before launch
    const API_BASE = "http://localhost:4000";

    const token = new URLSearchParams(window.location.search).get("token");

    const form = document.getElementById("reset-form");
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirm");
    const passwordError = document.getElementById("password-error");
    const confirmError = document.getElementById("confirm-error");
    const apiError = document.getElementById("api-error");
    const submitBtn = document.getElementById("submit-btn");
    const formView = document.getElementById("form-view");
    const successView = document.getElementById("success-view");

    if (!token) {
      formView.innerHTML = '<p class="body-text" style="text-align:center;color:#c0392b;">Invalid link — no password reset token found. Try opening the link from your email again.</p>';
    }

    function clearErrors() {
      passwordInput.classList.remove("input-error");
      confirmInput.classList.remove("input-error");
      passwordError.classList.remove("visible");
      confirmError.classList.remove("visible");
      apiError.classList.remove("visible");
      passwordError.textContent = "";
      confirmError.textContent = "";
      apiError.textContent = "";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      clearErrors();

      const password = passwordInput.value;
      const confirm = confirmInput.value;
      let valid = true;

      if (password.length < 8) {
        passwordError.textContent = "Password must be at least 8 characters.";
        passwordError.classList.add("visible");
        passwordInput.classList.add("input-error");
        valid = false;
      }

      if (valid && password !== confirm) {
        confirmError.textContent = "Passwords do not match.";
        confirmError.classList.add("visible");
        confirmInput.classList.add("input-error");
        valid = false;
      }

      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "Resetting…";

      try {
        const res = await fetch(API_BASE + "/v1/users/password/reset", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, password: password }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => null);
          const msg = data && data.error ? data.error : "Something went wrong. Please try again.";
          throw new Error(msg);
        }

        formView.style.display = "none";
        successView.classList.add("active");
      } catch (err) {
        apiError.textContent = err.message;
        apiError.classList.add("visible");
        submitBtn.disabled = false;
        submitBtn.textContent = "Reset Password";
      }
    });
  </script>
</body>
</html>
